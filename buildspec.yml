version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      #- pip install -r requirements.txt  old
      - python -m pip install --upgrade pip
      - pip install -r requirements.txt

  build:
    commands:
      - echo "Build completed on `date`"

artifacts:
  files:
    - '**/*'
  discard-paths: no
  #Wyraźne discard-paths: no (zachowuje strukturę katalogów)

